<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/Allify/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>allify</title>
  <style>
    :root {
      --bg-color: #fafafa;
      --dot-pattern-color: #d4d4d8;
      --text-main: #18181b;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #09090b;
        --dot-pattern-color: #3f3f46;
        --text-main: #f4f4f5;
      }
    }

    body {
      background-color: var(--bg-color);
      margin: 0;
    }

    /* Initial Loader Styles */
    #initial-loader {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-color);
      background-image: radial-gradient(var(--dot-pattern-color) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    .initial-spinner {
      width: 1.25rem;
      height: 1.25rem;
      border: 2px solid #e4e4e7;
      border-radius: 50%;
      border-top-color: var(--text-main);
      animation: spin 0.8s linear infinite;
    }

    @media (prefers-color-scheme: dark) {
      .initial-spinner {
        border-color: #27272a;
        border-top-color: var(--text-main);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
  <script type="module" crossorigin src="/Allify/assets/index-u9QtjSfO.js"></script>
  <link rel="stylesheet" crossorigin href="/Allify/assets/index-D6zsY4hn.css">
</head>

<body>
  <div id="root">
    <div id="initial-loader">
      <div class="initial-spinner"></div>
    </div>
  </div>
</body>

</html>
