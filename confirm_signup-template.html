<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Your Signup</title>
</head>
<body
    style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #000000; color: #ffffff;">
    <table role="presentation" width="100%" border="0" cellspacing="0" cellpadding="0"
        style="background-color: #000000; padding: 40px 20px;">
        <tr>
            <td align="center">
                <!-- Main Container -->
                <div style="max-width: 480px; width: 100%; text-align: left;">
                    <!-- Logo / Header -->
                    <h1
                        style="margin: 0 0 24px; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; color: #ffffff; text-align: center;">
                        Allify</h1>
                    <!-- Card -->
                    <div
                        style="background-color: #111111; border: 1px solid #333333; border-radius: 12px; padding: 32px;">
                        <h2 style="margin: 0 0 16px; font-size: 20px; font-weight: 600; color: #ffffff;">Confirm your
                            email</h2>
                        <p style="margin: 0 0 24px; font-size: 15px; line-height: 1.5; color: #a1a1aa;">
                            Welcome to Allify! To complete your signup, please enter the following verification code.
                        </p>
                        <!-- Code Box -->
                        <div
                            style="background-color: #1a1a1a; border-radius: 8px; padding: 24px; text-align: center; margin-bottom: 32px; border: 1px dashed #444444;">
                            <span
                                style="font-family: 'Courier New', monospace; font-size: 36px; font-weight: 700; letter-spacing: 8px; color: #ffffff;">
                                {{ .Token }}
                            </span>
                        </div>
                        <div style="border-top: 1px solid #333333; margin-top: 32px; padding-top: 24px;">
                            <p style="margin: 0; font-size: 13px; line-height: 1.6; color: #71717a;">
                                If you didn't request this code, you can safely ignore this email. Someone might have
                                typed your email address by mistake.
                            </p>
                        </div>
                    </div>
                    <!-- Footer -->
                    <p style="margin: 24px 0 0; font-size: 12px; color: #52525b; text-align: center;">
                        &copy; Allify. All rights reserved.
                    </p>
                </div>
            </td>
        </tr>
    </table>
</body>
</html>
